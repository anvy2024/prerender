version: '3.8'

services:
  seo-bot:
    image: 339713009221.dkr.ecr.ca-central-1.amazonaws.com/prerender:latest
    expose:
      - 8830
    environment:
      NODE_ENV:
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
      SITE_URL: https://gotoprint.ca
      STATIC_SITE_DIR: /data/site
      TZ: America/Edmonton
      EXECUTE_JOB_ON_START: "false"
      DATABASE_URL: postgresql://prerender:${POSTGRES_PASSWORD}@postgres:5432/prerender
    networks:
      - worktraq
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - worktraq-site:/data/site
    cap_add:
      - ALL
    restart: always
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: prerender
      POSTGRES_USER: prerender
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - worktraq
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

volumes:
  worktraq-site:
  postgres-data:
networks:
  worktraq:
    name: worktraqserver_worktraq
    external: true
